# Local dev stack: API + Postgres + Redis (+ MinIO for the storage seam in later
# phases). In staging/prod the API points at the existing Supabase Postgres instead.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: capimax
      POSTGRES_PASSWORD: capimax
      POSTGRES_DB: capimax
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capimax"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: capimax
      MINIO_ROOT_PASSWORD: capimax123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://capimax:capimax@db:5432/capimax
      ALEMBIC_DATABASE_URL: postgresql+psycopg://capimax:capimax@db:5432/capimax
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: local
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    # Apply migrations then serve. (In prod, migrations are a separate deploy step.)
    command: >
      sh -c "pip install '.[dev]' &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
  miniodata:
